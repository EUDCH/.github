# Reusable zizmor static-analysis workflow for EUDCH / OPERAS repos.
#
# Scans the CALLING repo's GitHub Actions workflows with zizmor
# (https://github.com/zizmorcore/zizmor) for supply-chain and injection
# risks: unpinned actions, pull_request_target misuse, template injection,
# over-broad permissions, etc. By default it reports findings to the caller's
# Security tab (SARIF / code scanning) without failing CI, which suits the
# initial calibration phase.
#
# Usage (caller adds .github/workflows/zizmor.yml in its own repo):
#
#   name: zizmor
#   on:
#     pull_request:
#       branches: [main]
#     push:
#       branches: [main]
#   permissions:
#     contents: read
#     security-events: write
#   jobs:
#     zizmor:
#       uses: EUDCH/.github/.github/workflows/zizmor.yml@<sha>  # pin to a commit
#
# Private repos without GitHub Advanced Security should call with
# `advanced-security: false`. Public repos get code scanning for free.
name: zizmor (reusable)

on:
  workflow_call:
    inputs:
      persona:
        description: "Audit persona: regular | pedantic | auditor"
        type: string
        default: regular
      advanced-security:
        description: "Upload SARIF to the Security tab (needs code scanning)"
        type: boolean
        default: true
      enforce:
        description: "Fail CI on any zizmor finding (set true once the baseline is clean)"
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    name: zizmor static analysis
    runs-on: ubuntu-latest
    env:
      # A pull_request from a fork gets a read-only GITHUB_TOKEN regardless of
      # permissions:, so the SARIF upload to the Security tab cannot run. Rather
      # than SKIP fork PRs — which would leave external contributors' workflow
      # changes, the ones most worth checking, unscanned until after merge — we
      # downgrade them to annotation mode (advanced-security: false) below.
      # zizmor is static analysis and never executes the scanned workflows, so
      # running it on fork content is safe. Keyed on the caller's pull_request
      # payload, NOT github.event_name (ambiguous inside a workflow_call): a
      # same-repo PR, a push, or a dispatch is not a fork PR.
      IS_FORK_PR: ${{ github.event.pull_request != null && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7
        id: zizmor
        # On a fork PR, force advanced-security off (no SARIF upload is possible
        # on a read-only token) and surface findings as inline annotations
        # instead. advanced-security is ALWAYS off on a fork PR (the expression
        # below can't be true when IS_FORK_PR is true), so annotations can be
        # enabled for every fork PR — including a caller that itself sets
        # advanced-security: false — without ever colliding with the
        # mutually-exclusive advanced-security path. continue-on-error keeps a
        # downgraded fork PR non-blocking ONLY when the caller is report-only
        # (advanced-security: true + enforce: false), so its findings stay
        # advisory exactly as they would on a same-repo PR; every other case
        # (enforce: true, or a caller that sets advanced-security: false itself)
        # still blocks on findings via zizmor's exit code.
        continue-on-error: ${{ env.IS_FORK_PR == 'true' && inputs.advanced-security && !inputs.enforce }}
        with:
          # Pin the zizmor BINARY (the action default is version: latest). Left
          # unpinned, zizmor's ruleset and online-audit set drift, so a new or
          # strengthened audit can turn CI red across every caller with no repo
          # change — which is exactly what happened (a ref-version-mismatch
          # finding appeared on unchanged workflows). Bump this deliberately.
          version: "1.26.1"
          persona: ${{ inputs.persona }}
          advanced-security: ${{ inputs.advanced-security && env.IS_FORK_PR != 'true' }}
          annotations: ${{ env.IS_FORK_PR == 'true' }}
      # Report-only by default: advanced-security uploads SARIF and suppresses
      # zizmor's exit codes, so the step above always passes. Once a repo's
      # baseline is clean the caller sets enforce: true and the step below fails
      # CI on any finding. A justified `# zizmor: ignore[rule]` comment removes a
      # finding from the SARIF, so it also clears this gate.
      - name: Enforce zizmor findings
        if: ${{ inputs.enforce }}
        env:
          SARIF: ${{ steps.zizmor.outputs.output-file }}
          # Effective value: a downgraded fork PR has advanced-security off even
          # when the caller requested it, so the "no SARIF" branch below takes
          # the exit-code path instead of failing closed.
          ADVANCED_SECURITY: ${{ inputs.advanced-security && env.IS_FORK_PR != 'true' }}
        run: |
          if [ -z "$SARIF" ] || [ ! -f "$SARIF" ]; then
            if [ "$ADVANCED_SECURITY" = "true" ]; then
              echo "::error::enforce=true but no SARIF was produced — failing closed."
              exit 1
            fi
            # advanced-security=false runs zizmor in annotations mode, whose own
            # exit code already fails CI on findings; nothing to enforce here.
            echo "::notice::advanced-security=false; zizmor's exit code gates findings."
            exit 0
          fi
          if ! count="$(jq '[.runs[]?.results[]?] | length' "$SARIF")"; then
            echo "::error::could not parse the zizmor SARIF at $SARIF; failing closed (enforce=true)."
            exit 1
          fi
          echo "zizmor reported ${count} finding(s)"
          if [ "${count}" -gt 0 ]; then
            echo "::error::zizmor found ${count} finding(s); failing (enforce=true). Fix or ignore them."
            exit 1
          fi
